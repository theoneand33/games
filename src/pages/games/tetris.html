<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris</title>
    <script
      defer
      src="https://cloud.umami.is/script.js"
      data-website-id="da064a3b-21a9-480e-86fe-70f777c13f4e"
    ></script>
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4683698794241784"
      crossorigin="anonymous"
    ></script>
    <script>
      window.va =
        window.va ||
        function () {
          (window.vaq = window.vaq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <a href="/" style="font-size: 24px">Home</a>
  <body>
    <div style="text-align: center">
      <div
        id="container"
        style="border: #ccc 0px solid; height: 100%; width: 100%"
      ></div>
      <script src="/ruffle/ruffle.js"></script>
      <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
          const ruffle = window.RufflePlayer.newest();
          const player = ruffle.createPlayer();
          const container = document.getElementById("container");
          container.appendChild(player);
          player.style.height = "96vh";
          player.style.width = "98vw";
          player.load("/flash/tetris.swf");
        });
      </script>
    </div>
  </body>
</html>
